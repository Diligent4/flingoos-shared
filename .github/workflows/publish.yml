name: Publish Packages

on:
  push:
    paths: ['src/**', 'python/**', 'package.json']

  # Manual trigger for re-publishing
  workflow_dispatch:

env:
  PROJECT_ID: flingoos-production
  PROJECT_NUMBER: 407742180982
  REGION: me-west1

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # AUTO_BUMP_TOKEN is a fine-grained PAT from a repo admin, needed to
          # push the version-bump commit to main (GITHUB_TOKEN can't bypass branch protection).
          # Falls back to GITHUB_TOKEN for repos that don't have the secret yet.
          token: ${{ secrets.AUTO_BUMP_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/${{ env.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-actions-deployer@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
          project_id: ${{ env.PROJECT_ID }}

      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      # ============================================================
      # Determine version
      # ============================================================
      - name: Determine version
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")

          if [[ "${{ github.ref_name }}" == "main" ]]; then
            # Merged to main or manual re-publish on main → official release
            echo "npm_version=${BASE_VERSION}" >> $GITHUB_OUTPUT
            echo "python_version=${BASE_VERSION}" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "📦 Official release: ${BASE_VERSION}"
          else
            # Branch push → pre-release with branch name + short SHA
            BRANCH="${GITHUB_REF_NAME}"
            SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g' | head -c 40)
            SHORT_SHA=$(git rev-parse --short HEAD)
            # npm semver: 2.0.0-branch-name.abc1234
            echo "npm_version=${BASE_VERSION}-${SAFE_BRANCH}.${SHORT_SHA}" >> $GITHUB_OUTPUT
            # PEP 440: 2.0.0.dev20260329 (date-based dev version)
            DEV_NUM=$(date -u +%Y%m%d%H%M)
            echo "python_version=${BASE_VERSION}.dev${DEV_NUM}" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "📦 Pre-release: npm=${BASE_VERSION}-${SAFE_BRANCH}.${SHORT_SHA} python=${BASE_VERSION}.dev${DEV_NUM}"
          fi

      # ============================================================
      # Build and test
      # ============================================================
      - run: npx google-artifactregistry-auth
      - run: npm ci
      - run: npm run build
      # - run: npm test

      # ============================================================
      # Publish npm
      # ============================================================
      - name: Publish npm package
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          TARGET="${{ steps.version.outputs.npm_version }}"
          if [[ "$CURRENT" != "$TARGET" ]]; then
            npm version "$TARGET" --no-git-tag-version
          fi
          npm publish --tag ${{ steps.version.outputs.is_prerelease == 'true' && 'next' || 'latest' }} || {
            if npm view "@flingoos/shared@${TARGET}" version 2>/dev/null; then
              echo "⚠️ npm: version ${TARGET} already published — skipping"
            else
              exit 1
            fi
          }

      # ============================================================
      # Publish Python
      # ============================================================
      - run: pip install build==1.4.2 twine==6.2.0 keyrings.google-artifactregistry-auth

      - name: Build and publish Python package
        run: |
          cd python/flingoos_shared_models

          # Update version in pyproject.toml
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.python_version }}\"/" pyproject.toml

          python -m build --wheel
          twine upload \
            --repository-url https://${{ env.REGION }}-python.pkg.dev/${{ env.PROJECT_ID }}/flingoos-python/ \
            dist/* || echo "⚠️ Python: version may already exist — skipping"

      # ============================================================
      # Tag official releases and bump version for next cycle
      # ============================================================
      - name: Tag release and bump version
        if: steps.version.outputs.is_prerelease == 'false'
        run: |
          VERSION="${{ steps.version.outputs.npm_version }}"

          # If tag already exists, this is a re-run — skip everything
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "⚠️ Tag v${VERSION} already exists — skipping tag and version bump"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Tag the release
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

          # Bump minor version for next development cycle (e.g., 2.1.0 → 2.2.0)
          NEXT_VERSION=$(node -e "const [ma,mi,pa]=process.argv[1].split('.').map(Number); console.log(ma+'.'+(mi+1)+'.0')" "$VERSION")
          npm version "$NEXT_VERSION" --no-git-tag-version
          sed -i "s/^version = .*/version = \"$NEXT_VERSION\"/" python/flingoos_shared_models/pyproject.toml

          git add package.json package-lock.json python/flingoos_shared_models/pyproject.toml
          git commit -m "chore: bump version to ${NEXT_VERSION} [skip ci]"
          git push origin main

      # ============================================================
      # Summary
      # ============================================================
      - name: Summary
        run: |
          echo "## 📦 Package Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| npm version | \`${{ steps.version.outputs.npm_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Python version | \`${{ steps.version.outputs.python_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-release | ${{ steps.version.outputs.is_prerelease }} |" >> $GITHUB_STEP_SUMMARY
          echo "| npm tag | ${{ steps.version.outputs.is_prerelease == 'true' && 'next' || 'latest' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
